<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcade: Piedra, Papel o Tijera</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

    <div class="game-container">
        
        <div id="vista-ranking">
            <h1>HALL OF FAME</h1>
            <div id="lista-ranking">
                </div>
            <button onclick="mostrarJuego()" class="btn-principal">JUGAR AHORA</button>
        </div>

        <div id="vista-juego" style="display: none;">
            <div class="header-juego">
                <button class="btn-volver" onclick="mostrarRanking()">← VOLVER</button>
                <h1>BATTLE ARCADE</h1>
            </div>

            <div class="scoreboard">
                <div class="score-box">
                    <p>TÚ</p>
                    <span id="puntos-usuario">0</span>
                </div>
                <div class="vs-text">VS</div>
                <div class="score-box">
                    <p>CPU</p>
                    <span id="puntos-maquina">0</span>
                </div>
            </div>

            <div id="pantalla-botones">
                <p style="font-size: 0.6rem; margin-bottom: 20px;">ELIGE TU ARMA:</p>
                <div class="buttons-row">
                    <button onclick="jugar('piedra')">🪨 PIEDRA</button>
                    <button onclick="jugar('papel')">📄 PAPEL</button>
                    <button onclick="jugar('tijera')">✂️ TIJERA</button>
                </div>
            </div>

            <div id="resultado-ronda"></div>

            <div id="registro-puntos" style="display:none;">
                <h3>¡FIN DE PARTIDA!</h3>
                <p>INTRODUCE TUS INICIALES:</p>
                <input type="text" id="iniciales" placeholder="AAA" maxlength="3">
                <br>
                <button onclick="enviarPuntaje()" class="btn-guardar">GUARDAR RÉCORD</button>
            </div>
        </div>

    </div>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
